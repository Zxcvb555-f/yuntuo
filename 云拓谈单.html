【最高优先级 绝对前置执行】
开口前必须先完成 2 项研判：①客户当前情绪状态 ②客户发言的核心诉求 / 潜在顾虑 / 真正想听到的回答，所有话术必须以「让客户舒服、放心、愿意继续沟通」为核心出发点，再匹配对应场景规则，禁止一套话术通用所有场景。

一、客户诉求响应铁律
客户上一句话提到的所有核心信息、情绪、疑问、顾虑，必须 100% 正面回应，绝对禁止跳过客户发言自顾自输出预设话术；客户提及负面体验 / 不满情绪，必须先共情安抚，再推进业务。
非问不答：客户没主动询问的内容，绝不主动解释、自证、铺垫（例：客户没问靠谱性，禁止主动说 “专业老师、案例充足”；客户没问交付能力，禁止主动说 “带过很多单”）。

二、提问规则铁律（统一标准 解决原规则冲突）

三、报价规则铁律（明确边界 解决原规则冲突）
精准报价必须集齐 3 项核心信息：学历、需求类型、字数，核心信息缺任意一项，绝对禁止精准报价。
例外情况：仅当客户连续 3 次以上咄咄逼人追问价格，才可在缺核心信息的情况下给出宽幅价格区间，否则必须先追问核心信息。
交稿时间、重复率、AI 率、文献要求、格式模板等非核心信息缺失，不卡死报价，可直接给出价格区间，顺带确认对应信息即可。
四、催单红线铁律（解决原规则互斥）
仅当满足以下唯一条件，才可在结尾加入下单引导：客户主动询问「怎么下单、怎么付款、什么时候能写、流程是什么」这类成交相关问题。
绝对禁止场景：输出承诺内容后，客户未明确表示接受、顾虑未完全解决时，严禁催单；客户未主动提及成交相关内容，严禁任何形式的下单引导。
五、先帮人再推进铁律
客户在对话中提出的任何具体需求 / 问题（选题、概念解释、资料审阅、方向推荐等），必须先完整、专业地解决到位，让客户获得有效价值后，再推进后续流程；绝对禁止敷衍解决问题后，同一条消息里立刻追问新信息。
【全流程执行标准 贴合对话节奏】
一、开场接待规则
打招呼后，先问需求类型，绝不默认是论文相关需求，绝不先报价。
已知客户专业但未知需求，仅追问需求类型，不报价、不做多余铺垫。
🔥 重要特例：如果客户直接说“咨询论文/写论文”，则立刻默认他的需求就是“代写论文正文”或有完整的论文需求，绝对不要再像机器人一样去细问“是开题、综述还是全论文需求”！
极简开场示例：
错：“明白，计算机硕士，常见的需求是开题、毕业论文或者期刊，目前是哪个阶段？”
对：“明白，计算机硕士，目前是有哪方面的写作需求？”
对：“本科护理，是开题、综述还是全论文需求？”
对（针对特例）：“咨询论文是吧，没问题。你是什么学历和专业呢？”
二、信息收集规则
报价必备核心信息：学历、专业、题目 / 方向、需求类型、字数
辅助优化信息：交稿时间、重复率、AI 率、文献条数、格式模板
执行要求：按对话节奏，单次最多提 2 个核心信息，自然融入，绝不做连环审问式提问。
三、信任建立与承诺规则
当客户表达不信任、提及 “上次没达到预期 / 你上次也这么说” 时，绝对禁止两类无效承诺：
空口无细节承诺：“放心、好好写、靠谱老师、包满意”
无内容情绪承诺：“我肯定不能让你失望、我给你把好关”
正确承诺顺序（不可调换）：先 1 句话说明无法保证的客观原因（诚实打底），再明确可落地的具体保证项。
正确示例：“我们没法给你保证固定分数，分数受导师主观评分标准影响。但能保证内容非 AI 生成、格式达标、跟进修改到你定稿”
错误示例：“导师评分虽然主观，但我肯定不能让你失望”
四、谈单节奏规则
开场期：先明确客户核心需求，有疑问先完整解答，像正常聊天一样推进信息收集，绝非流水线审问。
中期：核心信息集齐后直接一口精准报价；信息不足时，单次最多问 2 个最关键的缺口信息，问完即停，等待客户回应。
收尾期：仅当客户主动询问成交相关问题，才执行锁需→一口报价→明确下单指令，全程不拖泥带水，绝不提前催单。
五、场景化适配规则
学历适配（对人说人话）：
专科：话术直白简单，不带任何学术词汇
本科：口语化正常沟通，不堆砌理论框架
硕士：可沟通研究方法、理论框架，适度专业表达
博士：聚焦创新点、理论贡献，不解释基础学术概念
主动主见规则：
当客户表示 “不知道 / 没想好 / 没定” 某个信息时，不再追问，直接给出合理默认方案，询问客户是否合适。
正确示例：客户说 “交稿时间不太清楚，老师刚说要写初稿”→ 回复 “老师刚布置的话，我给你安排 2-4 周内交初稿，你看这个时间框合不合适？”
错误示例：同上客户发言→ 回复 “你计划多久完成呢？”
资料与上下文适配规则：
客户提供资料 / 附件，直接基于内容做专业分析，禁止说 “请发我看”；文件解析失败如实告知，禁止瞎编内容。
审阅要求：不无脑夸赞，先肯定亮点，再指出 1-3 个具体问题（逻辑断裂 / 数据缺失 / 框架空洞等），最后基于分析推进下一步沟通。
记忆要求：客户提出 “换题目 / 换类型”，仅更换指定内容，其余已确认信息全部保留；客户已确认的信息，绝不重复提及、重复追问。
六、真人说话核心铁则
极简开场，直奔核心：确认身份后，立即切入核心问题，不铺垫、不列举可能性、不解释背景。
省略已知，依赖语境：客户已确认的信息，默认双方已知，绝不重复罗列复述。
疑问句驱动，掌握主动权：用精准的口语化疑问句推进对话，不用 “我帮你 xxx”“你可以 xxx” 这类无意义填充式陈述句。
绝不过度承诺，只说具体可落地的保证项，禁止空口客套。
信息分层，重点聚焦：单次对话只传递 1-2 个核心信息 / 问题，次要信息省略，绝不信息轰炸。
七、高频风险场景基础应对原则（补全原场景缺失漏洞）
客户砍价 / 竞品比价：不贬低竞品，不卑微妥协，仅基于服务内容、交付标准、售后保障说明定价逻辑，不做无底线降价承诺。
客户要求试写：明确可提供的试写范围（如提纲、小段内容），禁止无底线免费试写，试写需求需先明确核心需求与预算。
客户投诉 / 返修要求：先共情安抚，再明确可落地的返修方案与时间，不推诿、不做超出服务范围的承诺。
客户犹豫 / 说再考虑：不催单、不纠缠，仅重申核心服务保障，留好沟通钩子，等待客户主动回应。
【说话风格与格式规范 严格执行】
语气要求：男性、专业、沉稳、直接果断，绝对禁止 “好的哈～”“呀～”“啦～” 这类软糯女性化语气，句尾不加波浪号；可使用自然简短语气词：哈 / 嗯 / 好 / 没问题。
格式要求：每句话15-25字，最多30字，像发微信一样短句分段，用 ||| 分隔不同气泡。严禁一大段堆砌，严禁用任何 Markdown 符号。
真人化铁律：删掉所有正式、客套、官方的表达；多用口语短句"你看""其实""咱""这样"；别用书面语"关于""针对""进行"；能说"行"就别说"可以的"；像朋友聊天不是客服话术。
时间适配：打招呼匹配当前时间，使用 {{GREETING}} 变量。
【最终回复必做自检清单】
有没有先完整回应客户的核心诉求、情绪与顾虑？
有没有违反非问不答、主动自证、暴露内部操作的规则？
有没有违规催单、空口无效承诺的内容？
有没有违反单次最多 2 个问题的规则，出现连环审问？
话术、语气、格式是否符合人设与规范要求？
客户提出的具体问题，是否完整解决到位，有没有敷衍后立刻追问？
有没有重复客户已确认的信息，有没有与已确认内容相悖的表述？

== 输出格式（强制执行必须遵守）==
{{THINK_FORMAT_PLACEHOLDER}}
[
  {"type":"切入角度(2-6字)","content":"回复内容"},
  {"type":"切入角度","content":"回复内容"}
]
- 🔥🔥🔥 你必须并且只能输出包含2个对象的JSON数组！少于2个是严重违规！
- 两个选项提供不同的策略，且都必须完整可用。
- content内如果需要换行用\\n，如果是分为两条独立消息发送用 ||| 隔开。
`;

执行要求：按对话节奏，单次最多提 2 个核心信息，自然融入，绝不做连环审问式提问。
三、信任建立与承诺规则
当客户表达不信任、提及 “上次没达到预期 / 你上次也这么说” 时，绝对禁止两类无效承诺：
空口无细节承诺：“放心、好好写、靠谱老师、包满意”
无内容情绪承诺：“我肯定不能让你失望、我给你把好关”
正确承诺顺序（不可调换）：先 1 句话说明无法保证的客观原因（诚实打底），再明确可落地的具体保证项。
正确示例：“我们没法给你保证固定分数，分数受导师主观评分标准影响。但能保证内容非 AI 生成、格式达标、跟进修改到你定稿”
错误示例：“导师评分虽然主观，但我肯定不能让你失望”
四、谈单节奏规则
开场期：先明确客户核心需求，有疑问先完整解答，像正常聊天一样推进信息收集，绝非流水线审问。
中期：核心信息集齐后直接一口精准报价；信息不足时，单次最多问 2 个最关键的缺口信息，问完即停，等待客户回应。
收尾期：仅当客户主动询问成交相关问题，才执行锁需→一口报价→明确下单指令，全程不拖泥带水，绝不提前催单。
五、场景化适配规则
学历适配（对人说人话）：
专科：话术直白简单，不带任何学术词汇
本科：口语化正常沟通，不堆砌理论框架
硕士：可沟通研究方法、理论框架，适度专业表达
博士：聚焦创新点、理论贡献，不解释基础学术概念
主动主见规则：
当客户表示 “不知道 / 没想好 / 没定” 某个信息时，不再追问，直接给出合理默认方案，询问客户是否合适。
正确示例：客户说 “交稿时间不太清楚，老师刚说要写初稿”→ 回复 “老师刚布置的话，我给你安排 2-4 周内交初稿，你看这个时间框合不合适？”
错误示例：同上客户发言→ 回复 “你计划多久完成呢？”
资料与上下文适配规则：
客户提供资料 / 附件，直接基于内容做专业分析，禁止说 “请发我看”；文件解析失败如实告知，禁止瞎编内容。
审阅要求：不无脑夸赞，先肯定亮点，再指出 1-3 个具体问题（逻辑断裂 / 数据缺失 / 框架空洞等），最后基于分析推进下一步沟通。
记忆要求：客户提出 “换题目 / 换类型”，仅更换指定内容，其余已确认信息全部保留；客户已确认的信息，绝不重复提及、重复追问。
六、真人说话核心铁则
极简开场，直奔核心：确认身份后，立即切入核心问题，不铺垫、不列举可能性、不解释背景。
省略已知，依赖语境：客户已确认的信息，默认双方已知，绝不重复罗列复述。
疑问句驱动，掌握主动权：用精准的口语化疑问句推进对话，不用 “我帮你 xxx”“你可以 xxx” 这类无意义填充式陈述句。
绝不过度承诺，只说具体可落地的保证项，禁止空口客套。
信息分层，重点聚焦：单次对话只传递 1-2 个核心信息 / 问题，次要信息省略，绝不信息轰炸。
七、高频风险场景基础应对原则（补全原场景缺失漏洞）
客户砍价 / 竞品比价：不贬低竞品，不卑微妥协，仅基于服务内容、交付标准、售后保障说明定价逻辑，不做无底线降价承诺。
客户要求试写：明确可提供的试写范围（如提纲、小段内容），禁止无底线免费试写，试写需求需先明确核心需求与预算。
客户投诉 / 返修要求：先共情安抚，再明确可落地的返修方案与时间，不推诿、不做超出服务范围的承诺。
客户犹豫 / 说再考虑：不催单、不纠缠，仅重申核心服务保障，留好沟通钩子，等待客户主动回应。
【说话风格与格式规范 严格执行】
语气要求：男性、专业、沉稳、直接果断，绝对禁止 “好的哈～”“呀～”“啦～” 这类软糯女性化语气，句尾不加波浪号；可使用自然简短语气词：哈 / 嗯 / 好 / 没问题。
格式要求：每句话15-25字，最多30字，像发微信一样短句分段，用 ||| 分隔不同气泡。严禁一大段堆砌，严禁用任何 Markdown 符号。
真人化铁律：删掉所有正式、客套、官方的表达；多用口语短句"你看""其实""咱""这样"；别用书面语"关于""针对""进行"；能说"行"就别说"可以的"；像朋友聊天不是客服话术。
时间适配：打招呼匹配当前时间，使用 {{GREETING}} 变量。
【最终回复必做自检清单】
有没有先完整回应客户的核心诉求、情绪与顾虑？
有没有违反非问不答、主动自证、暴露内部操作的规则？
有没有违规催单、空口无效承诺的内容？
有没有违反单次最多 2 个问题的规则，出现连环审问？
话术、语气、格式是否符合人设与规范要求？
客户提出的具体问题，是否完整解决到位，有没有敷衍后立刻追问？
有没有重复客户已确认的信息，有没有与已确认内容相悖的表述？

                return b.updatedAt - a.updatedAt;
            });

                        if (m.status === 'recognizing text' && onProgress) {

                        }
                    }
                });
            } else if (onProgress) {

            return _tesseractWorker;
        };

                setUploadedFiles([]);
                setShowThoughts(false);
                setIsDeepThink(false);
                setAiSuggestions([]); // 会议隔离，清空残留想法
            };

            const handleDeleteSession = (id, e) => {
                e.stopPropagation();
                if (!window.confirm('确定删除该客户的所有记录吗？删除后不可恢复。')) return;
                setSessions(prev => {
                    const next = prev.filter(s => s.id !== id);
                    if (next.length === 0) {
                        const def = [{ id: Date.now().toString(), title: '新客户对话', tag: 'none', history: [], updatedAt: Date.now() }];
                        window.localforage.setItem('yt_sessions_v6', def);
                        setActiveSessionId(def[0].id);
                        return def;
                    }
                    const sorted = sortSessions(next);
                    window.localforage.setItem('yt_sessions_v6', sorted);
                    if (activeSessionId === id) setActiveSessionId(sorted[0].id);
                    return sorted;
                });
            };

            const handleTogglePin = (id, e) => {
                e.stopPropagation();
                setSessions(prev => {
                    const next = prev.map(s => s.id === id ? { ...s, isPinned: !s.isPinned, updatedAt: Date.now() } : s);
                    const sorted = sortSessions(next);
                    window.localforage.setItem('yt_sessions_v6', sorted);
                    return sorted;
                });
            };

            const handleRenameSession = (id, oldTitle, e) => {
                e.stopPropagation();
                const newTitle = window.prompt("请输入新的客户会话名称：", oldTitle);
                if (newTitle && newTitle.trim() && newTitle.trim() !== oldTitle) {
                    setSessions(prev => {
                        const next = prev.map(s => s.id === id ? { ...s, title: newTitle.trim(), updatedAt: Date.now() } : s);
                        const sorted = sortSessions(next);
                        window.localforage.setItem('yt_sessions_v6', sorted);
                        return sorted;
                    });
                }
            };

            const handleSwitchSession = (id) => {
                if (activeSessionId === id) return;
                setActiveSessionId(id);
                // 不再自动清空 inputMsg、已传文件和想法，确保用户辛苦写的草稿不会由于误触左侧列表而丢?
                setLastModel(null);
                setIsDeepThink(false);
                setAiSuggestions([]); // 切客户必须清空老客户专属想法策略
            };

            const handleChangeTag = (id, tag, e) => {
                if (e) e.stopPropagation();
                setSessions(prev => {
                    const next = prev.map(s => s.id === id ? { ...s, tag, updatedAt: Date.now() } : s);
                    const sorted = sortSessions(next);
                    window.localforage.setItem('yt_sessions_v6', sorted);
                    return sorted;
                });
            };

            const handleExportData = async () => {
                showToast("正在导出记录...");
                const data = await window.localforage.getItem('yt_sessions_v6');
                const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `云拓谈单备份_${Date.now()}.json`;
                a.click();
                URL.revokeObjectURL(url);
                showToast("备份导出成功");
            };

            const currentProvider = AI_PROVIDERS.find(p => p.id === appConfig.provider);

            const SettingsModal = ({ isOpen, onClose }) => {
                const [showKeysMap, setShowKeysMap] = useState({});
                const [testing, setTesting] = useState(false);

                const toggleKeyVisibility = (id) => setShowKeysMap(prev => ({ ...prev, [id]: !prev[id] }));

                if (!isOpen) return null;
                const currentP = AI_PROVIDERS.find(p => p.id === appConfig.provider);

                const testConnection = async () => {
                    const key = appConfig.keys[appConfig.provider];
                    if (!key) return showToast("请先在上方输入 API Key", "error");
                    setTesting(true);
                    try {
                        const isO1orO3 = currentP.fast.includes('o3') || currentP.fast.includes('o1');
                        let reqBody = {
                            model: currentP.fast,
                            messages: [{ role: 'user', content: '你好' }],
                            max_tokens: 10
                        };
                        if (!isO1orO3) reqBody.temperature = 1.0;

                        const res = await fetch(currentP.url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key} ` },
                            body: JSON.stringify(reqBody)
                        });
                        let dataStr = await res.text();
                        let d = {};
                        try { d = JSON.parse(dataStr); } catch (e) { }

                        if (!res.ok || d.error) {
                            const errMsg = (d.error && (d.error.message || d.error.code)) || dataStr.slice(0, 100);
                            let sol = "请检查：1. Key 是否填错或多复制了空格 2. 账号是否欠费或遭停用 3. 网络是否连接正常";
                            if (res.status === 401) sol = "API Key 密钥不正确，请确保没有多复制空格，或去官网重新生成";
                            if (res.status === 402 || res.status === 403) sol = "账号余额不足、欠费或被官方停用，请去官网充值";
                            if (res.status === 429) sol = "接口请求太频繁被限流，请稍等一分钟再试或提升账号并发等级";
                            showToast(`测试失败 [HTTP ${res.status}]: ${errMsg}\n\n解决建议：${sol}`, "error");
                        } else {
                            showToast("连接测试成功！API Key 运转正常");
                        }
                    } catch (e) {
                        showToast(`网络或跨域异常：${e.message}`, "error");
                    } finally {
                        setTesting(false);
                    }
                };

                return (
                    <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm" onClick={onClose}>
                        <div className="bg-white rounded-xl shadow-2xl max-w-md w-full p-6 flex flex-col max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2"><i className="fa-solid fa-gear text-blue-500"></i> 模型与API设置</h3>
                                <button onClick={onClose} className="text-slate-400 hover:text-slate-600"><i className="fa-solid fa-xmark"></i></button>
                            </div>

                            <div className="space-y-3">
                                {/* 当前使用的厂商选择 */}
                                <div>
                                    <label className="block text-xs font-medium text-slate-500 mb-1">当前使用的AI大模型：</label>
                                    <select
                                        value={appConfig.provider}
                                        onChange={(e) => updateConfig(p => ({ ...p, provider: e.target.value }))}
                                        className="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm text-slate-800 focus:border-blue-500 outline-none cursor-pointer"
                                    >
                                        {AI_PROVIDERS.map(p => <option key={p.id} value={p.id}>{p.name}{appConfig.keys[p.id] ? ' ✓' : ''}</option>)}
                                    </select>
                                </div>

                                {/* 所有厂商 API Key 列表（一次填齐，永久保存）*/}
                                <div className="border border-slate-200 rounded-lg overflow-hidden">
                                    <div className="bg-slate-50 px-3 py-2 border-b border-slate-200">
                                        <span className="text-xs font-semibold text-slate-600">🔑 API Key 管理（填入后自动保存，切换厂商不丢失）</span>
                                    </div>
                                    <div className="divide-y divide-slate-100">
                                        {AI_PROVIDERS.map(p => (
                                            <div key={p.id} className={`px-3 py-2.5 flex items-center gap-2 ${appConfig.provider === p.id ? 'bg-blue-50' : ''} `}>
                                                <div className="w-16 shrink-0">
                                                    <span className={`text-xs font-medium ${appConfig.provider === p.id ? 'text-blue-700' : 'text-slate-500'} `}>{p.name}</span>
                                                    {appConfig.provider === p.id && <span className="ml-1 text-[9px] text-blue-400">使用中</span>}
                                                </div>
                                                <div className="flex-1 relative flex items-center gap-1">
                                                    <input
                                                        type={showKeysMap[p.id] ? 'text' : 'password'}
                                                        placeholder={`${p.name} API Key...`}
                                                        value={appConfig.keys[p.id] || ''}
                                                        onChange={(e) => updateConfig(prev => ({ ...prev, keys: { ...prev.keys, [p.id]: e.target.value } }))}
                                                        className={`w-full text-xs rounded-md px-2 py-1.5 outline-none border ${appConfig.keys[p.id] ? 'border-emerald-300 bg-emerald-50 text-slate-700' : 'border-slate-200 bg-white text-slate-500'} focus:border-blue-400`}
                                                    />
                                                    <button onClick={() => toggleKeyVisibility(p.id)} className="text-slate-400 hover:text-slate-600 px-1 py-1 shrink-0">
                                                        <i className={`fa-solid ${showKeysMap[p.id] ? 'fa-eye-slash' : 'fa-eye'} text-xs`}></i>
                                                    </button>
                                                    {appConfig.keys[p.id] && (
                                                        <i className="fa-solid fa-circle-check text-emerald-400 text-xs shrink-0 ml-1"></i>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="px-3 py-1.5 bg-slate-50 border-t border-slate-100 flex justify-between items-center">
                                        <p className="text-[10px] text-slate-400">密钥仅安全保存在本地浏览器</p>
                                        <button onClick={testConnection} disabled={testing} className="text-[10px] text-blue-500 hover:text-blue-600 font-medium disabled:opacity-50">
                                            {testing ? '正在测试...' : '测试当前连通性'}
                                        </button>
                                    </div>
                                </div>

                                {/* 视觉模式开关 */}
                                <div className="p-3 bg-indigo-50/50 rounded-lg border border-indigo-100 flex gap-3 items-start">
                                    <input
                                        type="checkbox"
                                        id="useVision"
                                        className="mt-1 cursor-pointer"
                                        checked={appConfig.useVision}
                                        onChange={(e) => updateConfig(p => ({ ...p, useVision: e.target.checked }))}
                                    />
                                    <div>
                                        <label htmlFor="useVision" className="text-sm font-bold text-indigo-700 cursor-pointer block mb-0.5">
                                            开启多模态视觉模型能力（超速读图）
                                        </label>
                                        <p className="text-[10px] text-indigo-500/80 leading-snug">
                                            勾选后图片直接交给视觉 AI 阅读（比本地 OCR 更快更准）<br />DeepSeek 不支持视觉，需要配合 ChatGPT / Gemini / 智谱 / 通义千问 / 豆包使用。
                                        </p>
                                    </div>
                                </div>
                            </div>

                            <div className="mt-4">
                                <button onClick={() => {
                                    if (!appConfig.keys[appConfig.provider]) return showToast('请输入当前使用厂商的 API Key', 'error');
                                    onClose();
                                    showToast("模型配置保存成功");
                                }} className="w-full py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold shadow-sm transition-colors text-sm">
                                    保存并完成
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            const handleStartNewChatClick = () => setShowResetModal(true);

            const confirmStartNewChat = () => {
                setChatHistory([]); // 这会自动清空当前 session 的聊天记录并保存
                setInputMsg("");
                setLastModel(null);
                setMyThoughts('');
                setUploadedFiles([]);
                setShowThoughts(false);
                setIsDeepThink(false);
                setShowResetModal(false);
                showToast("当前对话已被清空", "info");
            };

            // ========================================
            // 文件上传处理
            // ========================================
            const readAsDataURL = (file) => new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });

            const readAsText = (file) => new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.onerror = reject;
                reader.readAsText(file, 'utf-8');
            });

            // 图片预处理：如果是视觉模式才极度压缩；本?OCR 绝对不发 JPEG
            const compressImage = (dataUrl, isVisionMode = false) => {
                return new Promise(resolve => {
                    const img = new Image();
                    img.onload = () => {
                        let { width, height } = img;
                        let maxSize = isVisionMode ? 1000 : 2500; // OCR时保留高分辨率，否则识别全乱?
                        // OCR 不应使用带损 JPEG，保留原始质?PNG
                        let type = isVisionMode ? 'image/jpeg' : 'image/png';
                        let quality = isVisionMode ? 0.7 : 1;

                        if (Math.max(width, height) > maxSize) {
                            const ratio = maxSize / Math.max(width, height);
                            width = Math.round(width * ratio);
                            height = Math.round(height * ratio);
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL(type, quality));
                    };
                    img.onerror = () => resolve(dataUrl);
                    img.src = dataUrl;
                });
            };

            // 通用文件处理（拖拽粘贴/点击上传共用）
            const processFiles = async (files) => {
                if (!files || !files.length) return;
                const results = [];
                for (const file of files) {
                    try {
                        if (file.type.startsWith('image/')) {
                            const rawDataUrl = await readAsDataURL(file);
                            // 传入当前模式以决定如何极致压缩图片
                            const dataUrl = await compressImage(rawDataUrl, appConfig.useVision);
                            const fname = file.name || `截图_${Date.now()}.png`;

                            // ======== 🚀 多模态大模型分支 ========
                            if (appConfig.useVision) {
                                showToast(`已启用多模态视觉引擎（图片已极速压缩），图片秒传！`);
                                results.push({ name: fname, type: 'image', dataUrl, ocrText: '（💡提示：已启用原生视觉模式读图）', ocrDone: true, size: file.size, rawFile: file });
                                continue;
                            }

                            // ======== 🐌 传统慢速本地OCR分支 ========
                            setOcrStatus('running');
                            setOcrProgress(0);
                            let ocrText = '';
                            try {
                                // 使用单例 worker，第一次需初始化词库，当前 request 结束后复用
                                let workerProgress = 0;
                                const worker = await (async () => {
                                    if (!_tesseractWorker) {
                                        // 首次创建，有初始化过程
                                        _tesseractWorker = await Tesseract.createWorker('chi_sim+eng', 1, {
                                            logger: m => {
                                                if (m.status === 'recognizing text') {
                                                    setOcrProgress(Math.round(m.progress * 100));
                                                } else if (m.status === 'loading tesseract core' || m.status === 'loading language traineddata') {
                                                    setOcrProgress(Math.round(m.progress * 30)); // 加载阶段占前 30%
                                                }
                                            }
                                        });
                                    }
                                    return _tesseractWorker;
                                })();
                                // 请注意：OCR路线下的 dataUrl 是无损保留清晰度 PNG
                                const { data: { text } } = await worker.recognize(dataUrl, {}, {
                                    pdf: false,
                                });
                                ocrText = text.trim() || '（未识别到文字，图片可能模糊或内容为纯图形。建议：可尝试开启右上角"视觉模式"读图）';
                                setOcrProgress(100);
                                setOcrStatus('done');
                                setTimeout(() => setOcrStatus('idle'), 2000);
                            } catch (ocrErr) {
                                ocrText = '（OCR识别失败，请手动将图片内容复制粘贴进来）';
                                setOcrStatus('error');
                                setTimeout(() => setOcrStatus('idle'), 3000);
                            }
                            results.push({ name: fname, type: 'image', dataUrl, ocrText, ocrDone: true, size: file.size, rawFile: file });
                        } else if (file.name?.match(/\.(txt|md|csv)$/i) || file.type?.includes('text')) {
                            const text = await readAsText(file);
                            results.push({ name: file.name, type: 'text', content: text.slice(0, 8000), size: file.size, rawFile: file });
                        } else if (file.name?.match(/\.docx$/i)) {
                            showToast(`🔍 正在读取 Word 文档...`);
                            const arrayBuffer = await file.arrayBuffer();
                            try {
                                const result = await mammoth.extractRawText({ arrayBuffer: arrayBuffer });
                                results.push({ name: file.name, type: 'text', content: result.value.slice(0, 8000) || '（文档内容为空）', size: file.size, rawFile: file });
                                showToast(`Word 文档读取完成`);
                            } catch (e) {
                                results.push({ name: file.name, type: 'text', content: '（Word 文档解析失败）', size: file.size, rawFile: file });
                            }
                        } else if (file.name?.match(/\.pdf$/i)) {
                            showToast(`🔍 正在读取 PDF 文档...`);
                            const arrayBuffer = await file.arrayBuffer();
                            try {
                                const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                                let fullText = '';
                                const maxPages = Math.min(pdf.numPages, 30); // 限制最多读30页内容
                                for (let i = 1; i <= maxPages; i++) {
                                    const page = await pdf.getPage(i);
                                    const textContent = await page.getTextContent();
                                    const pageText = textContent.items.map(item => item.str).join(' ');
                                    fullText += pageText + '\n';
                                }
                                                                results.push({ name: file.name, type: 'text', content: fullText.slice(0, 8000) || '（PDF内容为空或全是纯图片扫描件）', size: file.size, rawFile: file });
                                if (pdf.numPages > 30) {
                                    showToast(`PDF共${pdf.numPages}页，已读取前30页`, 'info');
                                }
                                showToast(`PDF 文档读取完成`);
                            } catch (e) {
                                results.push({ name: file.name, type: 'text', content: '（PDF文档解析失败或存在加密限制）', size: file.size, rawFile: file });
                            }
                        } else if (file.name?.match(/\.doc$/i)) {
                            results.push({ name: file.name, type: 'text', content: '【系统提示】这是一个老版本的 .doc 格式文件。客户端浏览器由于技术限制，无法安全读取它的二进制内容，所以此处内容为空。警告AI：你目前看不到内容，绝不可根据文件名瞎编里面的题目和要求！必须要求客户截图或另存 .docx 格式发送。', size: file.size, rawFile: file });
                        } else {
                            results.push({ name: file.name, type: 'text', content: '【系统提示】系统无法直接从该类型文件中提取文字内容（受限或不支持）。警告AI：你目前看不到文件里面写了什么，绝不能瞎编！请要求客户手动截图发来。', size: file.size, rawFile: file });
                        }
                    } catch (err) {
                        showToast(`${file.name || '未知文件'} 读取失败`, 'error');
                    }
                }
                if (results.length > 0) {
                    setUploadedFiles(prev => [...prev, ...results]);
                    showToast(`已添加 ${results.length} 个文件`);
                }
            };

            // 点击选择上传
            const handleFileUpload = async (e) => {
                await processFiles(Array.from(e.target.files));
                e.target.value = '';
            };

            const removeFile = (idx) => {
                setUploadedFiles(prev => prev.filter((_, i) => i !== idx));
            };

            // ========================================
            // 拖拽 + 粘贴上传
            // ========================================
            const [isDragging, setIsDragging] = useState(false);

            const handleDragOver = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setIsDragging(true);
            };
            const handleDragLeave = (e) => {
                e.preventDefault();
                if (!e.currentTarget.contains(e.relatedTarget)) {
                    setIsDragging(false);
                }
            };
            const handleDrop = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setIsDragging(false);
                processFiles(Array.from(e.dataTransfer.files));
            };

            // Ctrl+V 粘贴截图
            const handlePaste = (e) => {
                const items = e.clipboardData?.items;
                if (!items) return;
                const imageItems = Array.from(items).filter(item => item.type.startsWith('image/'));
                if (imageItems.length === 0) return; // 没图片就正常粘贴文字
                e.preventDefault();
                processFiles(imageItems.map(item => item.getAsFile()).filter(Boolean));
            };

            // ========================================
            // 历史记录补录功能
            // ========================================
            const handleHistoryDragOver = (e) => {
                e.preventDefault();
                e.stopPropagation();
            };
            const handleHistoryDrop = (e) => {
                e.preventDefault();
                e.stopPropagation();
                const files = Array.from(e.dataTransfer.files).filter(f =>
                    f.type.startsWith('image/') || f.name.endsWith('.txt')
                );
                if (files.length > 0) {
                    setHistoryImportFiles(prev => [...prev, ...files]);
                }
            };
            const handleHistoryPaste = (e) => {
                const items = e.clipboardData?.items;
                if (!items) return;
                const imageItems = Array.from(items).filter(item => item.type.startsWith('image/'));
                if (imageItems.length > 0) {
                    const files = imageItems.map(item => item.getAsFile()).filter(Boolean);
                    setHistoryImportFiles(prev => [...prev, ...files]);
                }
            };
            const handleHistoryFileUpload = (e) => {
                const files = Array.from(e.target.files).filter(f =>
                    f.type.startsWith('image/') || f.name.endsWith('.txt')
                );
                if (files.length > 0) {
                    setHistoryImportFiles(prev => [...prev, ...files]);
                }
                e.target.value = '';
            };
            const handleHistoryImport = async () => {
                if (historyImportFiles.length === 0) return;
                setIsImportingHistory(true);
                try {
                    let historyText = '';
                    for (const file of historyImportFiles) {
                        if (file.type.startsWith('image/')) {
                            historyText += `\n【历史图片：${file.name}】\n`;
                        } else if (file.name.endsWith('.txt')) {
                            const text = await file.text();
                            historyText += `\n【历史文本：${file.name}】\n${text}\n`;
                        }
                    }
                    setInputMsg(prev => prev + historyText);
                    setShowHistoryImport(false);
                    setHistoryImportFiles([]);
                    showToast("历史记录已导入到输入框", "success");
                } catch (error) {
                    console.error('导入历史记录失败:', error);
                    showToast("导入失败：" + error.message, "error");
                } finally {
                    setIsImportingHistory(false);
                }
            };

            // ========================================
            // 智能模型选择：本地关键词匹配（零延迟，无额外API消耗）
            // ========================================
            const classifyComplexity = (msg) => {
                // 复杂场景关键词：价格博弈、顾虑异议、安全担心、退款、多步骤谈判
                const complexKeywords = [

                    const reader = response.body.getReader();

                    console.log('🔍 AI想法原始返回:', content);
                    console.log('🔍 返回内容长度:', content.length);

                    // 🔥 超强JSON提取逻辑
                    let suggestions = [];

                    // 1. 尝试提取JSON数组（支持多种格式）
                    const patterns = [
                        /\[[\s\S]*?\]/,  // 标准JSON数组
                        /```json\s*(\[[\s\S]*?\])\s*```/,  // Markdown代码块
                        /```\s*(\[[\s\S]*?\])\s*```/,  // 无语言标记的代码块
                    ];

                    let jsonStr = null;
                    for (const pattern of patterns) {
                        const match = content.match(pattern);
                        if (match) {
                            jsonStr = match[1] || match[0];
                            console.log('✅ 匹配到JSON:', jsonStr.substring(0, 100));
                            break;
                        }
                    }

                    if (jsonStr) {
                        // 2. 尝试解析JSON
                        try {
                            suggestions = JSON.parse(jsonStr);
                            console.log('✅ 直接解析成功:', suggestions);
                        } catch (e1) {
                            console.log('⚠️ 直接解析失败，尝试清理...');
                            // 3. 清理并重试
                            try {
                                const cleaned = jsonStr
                                    .replace(/\n/g, ' ')
                                    .replace(/\r/g, '')
                                    .replace(/\t/g, ' ')
                                    .replace(/,\s*]/g, ']')
                                    .replace(/,\s*}/g, '}')
                                    .replace(/'/g, '"')
                                    .replace(/[\u0000-\u001F]+/g, '')
                                    .replace(/\s+/g, ' ')
                                    .trim();
                                suggestions = JSON.parse(cleaned);
                                console.log('✅ 清理后解析成功:', suggestions);
                            } catch (e2) {
                                console.log('⚠️ 清理后仍失败，尝试逐行提取...');
                            }
                        }
                    }

                    // 4. 如果JSON解析失败，尝试逐行提取引号内容
                    if (!Array.isArray(suggestions) || suggestions.length === 0) {
                        console.log('🔍 尝试逐行提取引号内容...');
                        const lines = content.split(/\n/);
                        const extracted = [];

                        for (const line of lines) {
                            // 匹配引号内至少10个字符的内容
                            const matches = line.match(/"([^"]{10,})"/g);
                            if (matches) {
                                for (const match of matches) {
                                    const text = match.slice(1, -1);  // 去掉引号
                                    if (extracted.length < 3 && text.length >= 10) {
                                        extracted.push(text);
                                    }
                                }
                            }
                        }

                        if (extracted.length > 0) {
                            suggestions = extracted;
                            console.log('✅ 逐行提取成功:', suggestions);
                        }
                    }

                    // 5. 最后验证并设置
                    if (Array.isArray(suggestions) && suggestions.length > 0) {
                        // 过滤掉太短的建议
                        const filtered = suggestions.filter(s => typeof s === 'string' && s.length >= 10);
                        if (filtered.length > 0) {
                            setAiSuggestions(filtered.slice(0, 3));
                            console.log('✅ 最终AI想法:', filtered.slice(0, 3));
                        } else {
                            console.error('❌ 所有建议都太短');
                        }
                    } else {
                        console.error('❌ 无法提取有效AI想法');
                        console.log('原始内容:', content);
                    }
                } catch (error) {
                    console.error('❌ 生成AI想法错误:', error);
                    console.error('❌ 错误详情:', error.message);
                    console.error('❌ 错误堆栈:', error.stack);
                } finally {
                    // 🔥 重置标志，允许下次调用
                    setIsGeneratingSuggestions(false);
                    setIsLoading(false);
                }
            };

            // 新增：消息回撤重新编?
            const handleRetractEdit = (index) => {
                setChatHistory(prev => {
                    const newHistory = [...prev];
                    const msgToEdit = newHistory[index];

                    // 恢复输入框内容
                    setInputMsg(msgToEdit.content || '');

                    // 恢复"我的想法"
                    if (msgToEdit.myThoughts) {
                        setMyThoughts(msgToEdit.myThoughts);
                        setShowThoughts(true);
                    }

                    // 恢复附件（如果有图片等）
                    if (msgToEdit.attachedFiles && msgToEdit.attachedFiles.length > 0) {
                        setUploadedFiles(msgToEdit.attachedFiles);
                    }

                    // 撤回当前消息及之后的所有消息，避免后续对话语境混乱
                    newHistory.splice(index);

                    // 🔥 清理思考链
                    setCurrentStreamThought('');
                    setDeepThinkSeconds(0);
                    setIsGeneratingDeep(false);
                    // 撤回时不清理 AI想法（aiSuggestions），保留策略指导

                    return newHistory;
                });
            };

            const handleSelectOption = (idx, msgIdx) => {
                setChatHistory(prev => {
                    const newHistory = [...prev];
                    if (newHistory[msgIdx] && newHistory[msgIdx].isOptions) {
                        newHistory[msgIdx] = { ...newHistory[msgIdx], selectedIdx: idx };
                    }
                    return newHistory;
                });
                // 复制选中的全部内容
                const msg = chatHistory[msgIdx];
                if (msg && msg.options && msg.options[idx]) {
                    const cleanContent = msg.options[idx].content.replace(/\|\|\|/g, '\n');
                    copyToClipboard(cleanContent);
                }
            };

            // 🌟 新功能：话术微调处理函数
            const handleToneAdjust = async (msgIdx, optionIdx, adjustType) => {
                const msg = chatHistory[msgIdx];
                if (!msg || !msg.options || !msg.options[optionIdx]) {
                    return showToast("无法找到该话术", "error");
                }

                const originalContent = msg.options[optionIdx].content;
                
                // 自定义模式：显示自定义弹窗
                if (adjustType === 'custom') {
                    setCustomAdjustData({ msgIdx, optionIdx, originalContent });
                    setShowCustomAdjustModal(true);
                    return;
                }

                // 预设模式的指令
                const adjustInstructions = {
                    cold: '保持核心意思，但字数砍掉30-40%，删掉所有讨好、热情、客套的废话。语气要淡、要短、要直接，像个不缺单子的老手在随口说话。不要用"您""请""非常"这种词，直接说事。',
                    warm: '保持核心意思，但改成真人聊天的口吻。多用"咱""你看""其实""哈"这种口语词，别那么正式。适当加点理解客户的话，但别过度煽情。就像朋友间聊天，自然点。',
                    professional: '保持核心意思，但自然地带上点专业词（比如"方法论""数据""框架"），别刻意堆砌。要让人觉得你懂行，但不是在背书。专业但不装，靠谱但不端着。'
                };

                const instruction = adjustInstructions[adjustType];
                await performToneAdjust(msgIdx, optionIdx, originalContent, instruction);
            };

            // 执行话术微调的核心函数
            const performToneAdjust = async (msgIdx, optionIdx, originalContent, instruction) => {
                const currentKey = appConfig.keys[appConfig.provider];
                if (!currentKey) {
                    setShowSettingsModal(true);
                    return showToast("请先配置 API Key", "error");
                }

                showToast("正在微调话术...");
                
                // 临时标记正在调整
                setChatHistory(prev => {
                    const newHistory = [...prev];
                    if (newHistory[msgIdx] && newHistory[msgIdx].options) {
                        const newOptions = [...newHistory[msgIdx].options];
                        newOptions[optionIdx] = {
                            ...newOptions[optionIdx],
                            isAdjusting: true
                        };
                        newHistory[msgIdx] = { ...newHistory[msgIdx], options: newOptions };
                    }
                    return newHistory;
                });

                try {
                    const adjustPrompt = `你是个真人销售，不是AI机器人。现在要把下面这段话改得更像人说的。

【修改要求】
${instruction}

【原始话术】
${originalContent.replace(/\|\|\|/g, '\n')}

【死规矩】
1. 绝对不要用AI腔调：什么"非常""十分""务必""您好""感谢""期待"这种客套废话全删
2. 每句话控制在15-25字，最多不超过30字，别一大段一大段的
3. 多用短句，少用长句，能断开就断开
4. 像微信聊天一样自然，别像在写公文
5. 如果原文有多段（|||分隔的），改完也保持这个分段
6. 直接输出改好的话术，不要解释、不要标记、不要多余的话

记住：你是个真人在打字聊天，不是在写演讲稿！`;

                    let response = await fetch(currentProvider.url, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${currentKey}`
                        },
                        body: JSON.stringify({
                            model: currentProvider.fast,
                            messages: [
                                { role: 'user', content: adjustPrompt }
                            ],
                            temperature: 0.7,
                            max_tokens: 800
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`API错误: ${response.status}`);
                    }

                    const data = await response.json();
                    const adjustedContent = data.choices[0].message.content.trim();

                    // 更新话术内容
                    setChatHistory(prev => {
                        const newHistory = [...prev];
                        if (newHistory[msgIdx] && newHistory[msgIdx].options) {
                            const newOptions = [...newHistory[msgIdx].options];
                            newOptions[optionIdx] = {
                                ...newOptions[optionIdx],
                                content: adjustedContent,
                                isAdjusting: false,
                                originalContent: originalContent // 保存原始内容以便撤销
                            };
                            newHistory[msgIdx] = { ...newHistory[msgIdx], options: newOptions };
                        }
                        return newHistory;
                    });

                    showToast("话术微调完成！");
                } catch (error) {
                    showToast(`微调失败: ${error.message}`, "error");
                    
                    // 恢复原状
                    setChatHistory(prev => {
                        const newHistory = [...prev];
                        if (newHistory[msgIdx] && newHistory[msgIdx].options) {
                            const newOptions = [...newHistory[msgIdx].options];
                            newOptions[optionIdx] = {
                                ...newOptions[optionIdx],
                                isAdjusting: false
                            };
                            newHistory[msgIdx] = { ...newHistory[msgIdx], options: newOptions };
                        }
                        return newHistory;
                    });
                }
            };

            const showToast = (msg, type = 'success') => {
                setToast({ msg, type });
                setTimeout(() => setToast(null), 3000);
            };

            const copyToClipboard = (text) => {
                // 先将文本中的字面 \n 转为真实换行符
                const realText = text.replace(/\\n/g, '\n');
                // 优先使用现代 clipboard API
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(realText).then(() => {
                        showToast("已复制到剪贴板");
                    }).catch(() => {
                        legacyCopy(realText);
                    });
                } else {
                    legacyCopy(realText);
                }
            };

            const legacyCopy = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-9999px";
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    showToast("已复制到剪贴板");
                } catch (err) {
                    showToast("复制失败", "error");
                }
                document.body.removeChild(textArea);
            };

            const renderBubbles = (content, isUser, attachedFiles = [], myThoughts = '') => {
                if (isUser) {
                    return (
                        <div className="bg-slate-100/80 p-4 rounded-[24px] rounded-tr-md shadow-sm text-slate-800 border border-slate-200/50 bubble-user">
                            {myThoughts && (
                                <div className="mb-3 pb-2 border-b border-[#07c160]/20 flex flex-col gap-1 text-xs text-amber-700 bg-amber-50 p-2.5 rounded-lg border border-amber-200 shadow-sm">
                                    <div className="flex items-center gap-1.5 font-bold uppercase tracking-wider text-[10px] text-amber-600">
                                        <i className="fa-solid fa-lightbulb"></i> 我的内部想法
                                    </div>
                                    <div className="leading-relaxed opacity-90">{myThoughts}</div>
                                </div>
                            )}
                            <div className="whitespace-pre-wrap leading-relaxed">{content}</div>
                            {attachedFiles && attachedFiles.length > 0 && (
                                <div className="mt-2 pt-2 border-t border-[#07c160]/20 flex flex-wrap gap-2">
                                    {attachedFiles.map((f, idx) => (
                                        f.type === 'image' ? (
                                            <img key={idx} src={f.dataUrl} className="h-10 w-10 object-cover rounded shadow-sm cursor-pointer hover:opacity-80 transition bg-white" onClick={() => setPreviewFile({ ...f, type: 'image' })} title="点击预览图片" alt={f.name} />
                                        ) : (
                                            <div key={idx} className="flex items-center gap-1.5 bg-white/50 px-2 py-1.5 rounded-md text-xs text-slate-700 shadow-sm cursor-pointer hover:bg-white transition border border-[#07c160]/30" onClick={() => f.content ? setPreviewFile({ ...f, type: 'text' }) : showToast('该类型文档暂无文本预览', 'info')} title={`点击查看内容: ${f.name}`}>
                                                <i className="fa-solid fa-file-lines text-blue-500"></i>
                                                <span className="truncate max-w-[120px] font-medium">{f.name}</span>
                                            </div>
                                        )
                                    ))}
                                </div>
                            )}
                        </div>
                    );
                }
                const parts = content.split('|||');
                return (
                    <div className="flex flex-col gap-2.5 items-start">
                        {parts.map((part, idx) => (
                            <div key={idx} className="group/bubble relative bg-white p-4 pr-11 rounded-[24px] rounded-tl-md shadow-[0_2px_18px_-5px_rgba(0,0,0,0.06),0_10px_20px_-5px_rgba(0,0,0,0.04)] text-slate-800 border-none bubble-ai">
                                <div className="whitespace-pre-wrap leading-relaxed space-y-2">{part.trim()}</div>
                                <button
                                    onClick={(e) => { e.stopPropagation(); copyToClipboard(part.trim()); }}
                                    className="absolute top-2 right-2 w-7 h-7 flex items-center justify-center rounded-md text-slate-300 hover:text-[#07c160] hover:bg-slate-50 opacity-0 group-hover/bubble:opacity-100 transition-all"
                                    title="复制这条"
                                >
                                    <i className="fa-regular fa-copy text-xs"></i>
                                </button>
                            </div>
                        ))}
                    </div>
                );
            };

            const modelLabel = (model) => {
                if (!model) return null;
                // 判断当前使用的模型是否是某个厂家的深度思考模型
                const isDeepModel = AI_PROVIDERS.some(p => p.deep === model);
                const badgeText = isDeepModel ? '🧠 深度思考' : '⚡ 快速回复';
                const badgeClass = isDeepModel ? 'model-badge-deep' : 'model-badge-fast';
                return (
                    <div className="flex items-center gap-1.5 ml-1">
                        <span className={`${badgeClass} text-[10px] font-bold px-2 py-0.5 rounded-full shadow-sm`}>{badgeText}</span>
                        <span className="text-[10px] text-slate-400 font-mono bg-slate-100/80 px-1.5 py-0.5 rounded border border-slate-200/50">{model}</span>
                    </div>
                );
            };

            return (
                <div className="flex h-screen overflow-hidden text-slate-800 bg-[#f5f5f5] relative">
                    <SettingsModal isOpen={showSettingsModal} onClose={() => setShowSettingsModal(false)} />
                    <ConfirmModal
                        isOpen={showResetModal}
                        onClose={() => setShowResetModal(false)}
                        onConfirm={confirmStartNewChat}
                        title="清空当前聊天内容"
                        message="这将清空当前客户的【所有】聊天记录。如果你接到了新客户，建议在左边点「接待新客户」新建对话。"
                    />

                    {/* 🌟 功能3：客户情报侧边卡 */}
                    {showCustomerInfo && (
                        <div className="fixed right-4 top-4 bottom-4 w-80 bg-white rounded-xl shadow-2xl border border-slate-200 flex flex-col z-50 overflow-hidden">
                            <div className="p-4 border-b border-slate-200 bg-gradient-to-r from-blue-50 to-purple-50 flex justify-between items-center">
                                <div className="flex items-center gap-2">
                                    <i className="fa-solid fa-address-card text-blue-600"></i>
                                    <h3 className="font-bold text-slate-800">客户情报卡</h3>
                                </div>
                                <button
                                    onClick={() => setShowCustomerInfo(false)}
                                    className="w-7 h-7 flex items-center justify-center rounded-full hover:bg-slate-200 text-slate-500 transition-colors"
                                >
                                    <i className="fa-solid fa-xmark"></i>
                                </button>
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-3">
                                {Object.entries({
                                    education: '学历',
                                    major: '专业',
                                    title: '论文题目',
                                    wordCount: '论文字数',
                                    plagiarismRate: '重复率查重率和要求网站',
                                    aigcRate: 'AIGC查重率和要求网站',
                                    deadline: '最晚交稿时间',
                                    needSurvey: '是否需要问卷调查',
                                    needEmpirical: '是否需要实证（SPSS或stata）',
                                    needSoftware: '是否需要软件（画图纸、建模、设计系统、做实物等）',
                                    otherRequirements: '其他需求'
                                }).map(([key, label]) => (
                                    <div key={key} className="bg-slate-50 rounded-lg p-3 border border-slate-200">
                                        <label className="text-xs font-bold text-slate-600 mb-1 block">{label}</label>
                                        <input
                                            type="text"
                                            value={customerInfo[key] || ''}
                                            onChange={(e) => setCustomerInfo(prev => ({ ...prev, [key]: e.target.value }))}
                                            placeholder="未提取到信息"
                                            className="w-full px-2 py-1.5 text-sm border border-slate-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white"
                                        />
                                    </div>
                                ))}
                            </div>
                            <div className="p-4 border-t border-slate-200 bg-slate-50 space-y-2">
                                <button
                                    onClick={() => {
                                        const text = Object.entries({
                                            '学历': customerInfo.education,
                                            '专业': customerInfo.major,
                                            '论文题目': customerInfo.title,
                                            '论文字数': customerInfo.wordCount,
                                            '重复率查重率和要求网站': customerInfo.plagiarismRate,
                                            'AIGC查重率和要求网站': customerInfo.aigcRate,
                                            '最晚交稿时间': customerInfo.deadline,
                                            '是否需要问卷调查': customerInfo.needSurvey,
                                            '是否需要实证（SPSS或stata）': customerInfo.needEmpirical,
                                            '是否需要软件': customerInfo.needSoftware,
                                            '其他需求': customerInfo.otherRequirements
                                        }).map(([k, v]) => `${k}：${v || '无'}`).join('\n');
                                        copyToClipboard(text);
                                    }}
                                    className="w-full px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors text-sm font-medium flex items-center justify-center gap-2"
                                >
                                    <i className="fa-solid fa-copy"></i>
                                    一键复制派单格式
                                </button>
                            </div>
                        </div>
                    )}

                    {/* 图片/文件预览弹窗 */}
                    {previewFile && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-sm transition-all" onClick={() => setPreviewFile(null)}>
                            <div className="relative bg-white rounded-xl shadow-2xl max-w-4xl w-full max-h-[90vh] flex flex-col overflow-hidden msg-anim" onClick={e => e.stopPropagation()}>
                                <div className="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                    <h3 className="font-bold text-slate-800 flex items-center gap-2 truncate pr-4">
                                        <i className={`fa-solid ${previewFile.type === 'image' ? 'fa-image text-emerald-500' : 'fa-file-lines text-blue-500'}`}></i>
                                        {previewFile.name}
                                    </h3>
                                    <button onClick={() => setPreviewFile(null)} className="w-8 h-8 flex relative items-center justify-center rounded-full hover:bg-slate-200 text-slate-500 transition-colors">
                                        <i className="fa-solid fa-xmark"></i>
                                    </button>
                                </div>
                                <div className="overflow-auto p-4 flex-1 flex justify-center bg-slate-100/50">
                                    {previewFile.type === 'image' ? (
                                        <img src={previewFile.dataUrl} className="max-w-full m-auto shadow-sm rounded-lg" alt="大图预览" />
                                    ) : (
                                        <pre className="whitespace-pre-wrap text-sm text-slate-700 w-full max-w-3xl bg-white p-6 shadow-sm rounded-xl border border-slate-200 font-sans leading-relaxed">
                                            {previewFile.content || "无法预览此文件或内容为空"}
                                            {previewFile.content?.length >= 8000 && "\n\n...(内容过长，仅展示前 8000 字...)"}
                                        </pre>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 侧边栏及遮罩 (移动端响应式) */}
                    {showSidebarMobile && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-30 md:hidden" onClick={() => setShowSidebarMobile(false)}></div>
                    )}

                    <div
                        className={`fixed md:relative flex flex-col flex-shrink-0 z-40 bg-slate-50 border-r border-slate-200 transition-all duration-300 h-full w-[280px] md:w-auto shadow-2xl md:shadow-none ${showSidebarMobile ? 'translate-x-0' : '-translate-x-full md:translate-x-0'} ${sidebarCollapsed ? 'md:-translate-x-full md:w-0 md:border-0 md:overflow-hidden' : ''}`}
                        style={{ width: window.innerWidth < 768 ? undefined : (sidebarCollapsed ? 0 : sidebarWidth) }}
                    >
                        <div className="p-6 border-b border-slate-200/50 bg-white">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="w-8 h-8 rounded-xl bg-gradient-to-br from-[#07c160] to-[#04a04d] flex items-center justify-center text-white shadow-md shadow-[#07c160]/20">
                                        <i className="fa-solid fa-leaf text-sm"></i>
                                    </div>
                                    <div>
                                        <h1 className="text-xl font-black text-slate-800 tracking-wide">云拓谈单顾问</h1>
                                        <p className="text-[10px] text-slate-400 font-medium">云端智能架构 V5.5</p>
                                    </div>
                                </div>
                                <button
                                    onClick={() => setSidebarCollapsed(!sidebarCollapsed)}
                                    className="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-100 text-slate-500 hover:text-slate-700 transition-colors"
                                    title={sidebarCollapsed ? "显示侧边栏" : "全屏模式（隐藏侧边栏）"}
                                >
                                    <i className={`fa-solid ${sidebarCollapsed ? 'fa-angles-right' : 'fa-angles-left'} text-sm`}></i>
                                </button>
                            </div>
                        </div>

                        <div className="flex-1 overflow-hidden flex flex-col">
                            <div className="p-4 border-b border-slate-100 flex-shrink-0">
                                <button
                                    onClick={handleCreateSession}
                                    className="w-full py-3 bg-[#07c160] hover:bg-[#06ad56] text-white rounded-lg font-medium transition-all shadow-sm flex items-center justify-center gap-2 active:scale-95"
                                >
                                    <i className="fa-solid fa-plus"></i> 接待新客户
                                </button>
                            </div>

                            {/* 会话列表*/}
                            <div className="flex-1 overflow-y-auto w-full p-3 space-y-2">
                                {sessions.map(s => (
                                    <div
                                        key={s.id}
                                        onClick={() => handleSwitchSession(s.id)}
                                        className={`group relative p-3 rounded-lg border cursor-pointer transition-all ${s.id === activeSessionId ? 'bg-green-50 border-green-300 shadow-sm' : 'bg-white border-slate-100 hover:border-green-200 hover:shadow-sm'}`}
                                    >
                                        <div className="flex justify-between items-start mb-2 relative">
                                            {s.isPinned && <i className="fa-solid fa-thumbtack absolute -left-1 -top-1 text-amber-500 text-[10px] transform -rotate-45"></i>}
                                            <div className={`font-bold text-xs text-slate-800 truncate pr-16 leading-tight ${s.isPinned ? 'ml-3' : ''}`}>{s.title}</div>
                                            <div className="absolute top-0 right-0 flex gap-1 bg-white/90 backdrop-blur-sm rounded px-1 opacity-0 group-hover:opacity-100 transition-all shadow-sm border border-slate-100">
                                                <button onClick={(e) => handleTogglePin(s.id, e)} className={`w-5 h-5 flex items-center justify-center rounded ${s.isPinned ? 'text-amber-500 hover:bg-amber-50' : 'text-slate-400 hover:text-amber-500 hover:bg-amber-50'} transition-colors`} title={s.isPinned ? "取消置顶" : "置顶该客户"}>
                                                    <i className="fa-solid fa-thumbtack text-[10px]"></i>
                                                </button>
                                                <button onClick={(e) => handleRenameSession(s.id, s.title, e)} className="w-5 h-5 flex items-center justify-center rounded text-slate-400 hover:text-blue-500 hover:bg-blue-50 transition-colors" title="重命名会话">
                                                    <i className="fa-solid fa-pen text-[10px]"></i>
                                                </button>
                                                <button onClick={(e) => handleDeleteSession(s.id, e)} className="w-5 h-5 flex items-center justify-center rounded text-slate-400 hover:text-red-500 hover:bg-red-50 transition-colors" title="删除该客户">
                                                    <i className="fa-solid fa-trash-can text-[10px]"></i>
                                                </button>
                                            </div>
                                        </div>
                                        <div className="flex justify-between items-center">
                                            <span className="text-[10px] text-slate-400 font-medium tracking-wide">
                                                {new Date(s.updatedAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                                            </span>
                                            <select
                                                value={s.tag || 'none'}
                                                onChange={(e) => handleChangeTag(s.id, e.target.value, e)}
                                                onClick={e => e.stopPropagation()}
                                                className={`text-[10px] px-1.5 py-0.5 font-bold rounded cursor-pointer outline-none border border-transparent hover:border-black/5 ${s.tag === 'high' ? 'bg-green-100 text-green-700' :
                                                    s.tag === 'followup' ? 'bg-orange-100 text-orange-700' :
                                                        s.tag === 'lost' ? 'bg-slate-200 text-slate-600' :
                                                            s.tag === 'deal' ? 'bg-blue-100 text-blue-700' : 'bg-slate-100 text-slate-500'
                                                    }`}
                                            >
                                                <option value="none">无状态</option>
                                                <option value="high">🟢 高意向</option>
                                                <option value="followup">🟠 待回访</option>
                                                <option value="deal">🔵 已成交</option>
                                                <option value="lost">😢 已流失</option>
                                            </select>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* 左下角状态设定与设置 */}
                        <div className="p-4 border-t border-slate-200 bg-slate-50 flex-shrink-0 space-y-3">
                            <button onClick={handleExportData} className="w-full p-2 mb-2 bg-white border border-slate-200 hover:border-green-300 hover:text-green-600 rounded text-xs font-medium text-slate-600 transition-all shadow-sm flex items-center justify-center gap-2">
                                <i className="fa-solid fa-cloud-arrow-down"></i> 导出备份记录 (.json)
                            </button>

                            <div className="bg-white rounded-lg p-2.5 border border-slate-200 shadow-sm">
                                <div className="flex justify-between items-center">
                                    <span className="text-[10px] font-bold tracking-wider text-slate-600 flex items-center gap-1.5">
                                        <div className="w-2 h-2 rounded-full bg-blue-500"></div> 当前 AI 引擎
                                    </span>
                                    <span className="text-[10px] bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded font-medium">{currentProvider.name}</span>
                                </div>
                                <button onClick={() => setShowSettingsModal(true)} className="w-full mt-2 py-1.5 bg-slate-50 border border-slate-200 hover:border-blue-300 hover:text-blue-600 rounded text-[10px] font-medium text-slate-500 transition-all shadow-sm flex items-center justify-center gap-1">
                                    <i className="fa-solid fa-sliders"></i> 切换模型与设置 API
                                </button>
                            </div>

                            <div className="flex justify-between items-center px-1">
                                <span className="text-[9px] text-slate-400 font-medium tracking-wide">v6.0 DB 本地云版</span>
                                <span className="text-[9px] text-green-500 font-medium flex items-center gap-1">
                                    <span className="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
                                    100% 不限容量
                                </span>
                            </div>
                        </div>
                    </div>

                    <div
                        className="hidden md:flex w-2 lg:w-1.5 bg-transparent hover:bg-[#07c160] cursor-col-resize z-50 transition-colors relative"
                        onMouseDown={(e) => {
                            e.preventDefault();
                            setIsResizing(true);
                        }}
                    >
                        {/* 扩大命中热区 */}
                        <div className="absolute inset-y-0 -left-2 -right-2 bg-transparent z-40"></div>
                        {isResizing && <div className="absolute inset-y-0 left-0 right-0 bg-[#07c160]"></div>}
                    </div>

                    {/* 右侧：聊天主界面 */}
                    <div className={`flex-1 flex flex-col relative bg-[#f7f8fa] h-full ${showSidebarMobile ? 'pointer-events-none' : ''}`}>
                        {/* 🔥 桌面端展开侧边栏按钮（折叠时显示） */}
                        {sidebarCollapsed && (
                            <button
                                onClick={() => setSidebarCollapsed(false)}
                                className="hidden md:flex fixed top-4 left-4 z-50 w-10 h-10 items-center justify-center rounded-lg bg-white border-2 border-slate-200 hover:border-[#07c160] hover:bg-[#07c160] hover:text-white text-slate-600 shadow-lg transition-all"
                                title="展开侧边栏"
                            >
                                <i className="fa-solid fa-angles-right text-sm"></i>
                            </button>
                        )}

                        {/* 移动端顶部栏（显示汉堡菜单） */}
                        <div className="md:hidden flex items-center justify-between p-4 border-b border-slate-200/60 bg-white/80 backdrop-blur-md z-10 sticky top-0">
                            <h2 className="text-[15px] font-black tracking-wide text-slate-800 flex items-center gap-2">
                                <div className="w-5 h-5 rounded hover:scale-105 transition-transform bg-gradient-to-br from-[#07c160] to-[#04a04d] flex items-center justify-center text-white shadow-sm">
                                    <i className="fa-solid fa-leaf text-[9px]"></i>
                                </div>
                                谈单顾问
                            </h2>
                            <button onClick={() => setShowSidebarMobile(true)} className="w-8 h-8 flex items-center justify-center text-slate-600 rounded-lg bg-slate-100 hover:bg-slate-200 transition-colors">
                                <i className="fa-solid fa-bars text-sm"></i>
                            </button>
                        </div>

                        <div className="flex-1 overflow-y-auto p-4 md:p-6 space-y-6">
                            {chatHistory.length === 0 && (
                                <div className="text-center py-20 opacity-40 select-none">
                                    <div className="w-16 h-16 bg-slate-200 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl text-slate-500">
                                        <i className="fa-solid fa-graduation-cap"></i>
                                    </div>
                                    <p className="text-lg font-medium text-slate-600">粘贴客户消息，AI 为你提供专业回复</p>
                                    <p className="text-sm mt-2 text-slate-500">题目分析 / 信息收集 / 报价参考 / 灵活谈单/ 灵活谈单</p>
                                </div>
                            )}

                            {chatHistory.map((msg, idx) => (
                                <div key={idx} className={`flex w-full msg-anim ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                    {msg.role === 'user' && (
                                        <div className="max-w-[85%] flex flex-col items-end gap-1">
                                            <div className="flex gap-3 flex-row-reverse w-full justify-start">
                                                <div className="w-9 h-9 rounded bg-slate-200 flex items-center justify-center flex-shrink-0 text-slate-500">
                                                    <i className="fa-solid fa-user"></i>
                                                </div>
                                                {renderBubbles(msg.content, true, msg.attachedFiles, msg.myThoughts)}
                                            </div>
                                            {/* 新增：撤回重新编辑按?*/}
                                            <button
                                                onClick={() => handleRetractEdit(idx)}
                                                className="mt-1 text-[10px] text-slate-400 hover:text-blue-500 flex items-center gap-1 opacity-60 hover:opacity-100 transition-all mr-12"
                                                title="撤回这条消息，把图片和文本重新放回输入框修改"
                                            >
                                                <i className="fa-solid fa-rotate-left"></i> 撤回并重新编辑
                                            </button>
                                        </div>
                                    )}

                                    {msg.role === 'assistant' && !msg.isOptions && (
                                        <div className="max-w-[85%] flex gap-3">
                                            <div className="w-9 h-9 rounded bg-[#07c160] flex items-center justify-center flex-shrink-0 text-white shadow-sm font-bold text-xs">AI</div>
                                            {renderBubbles(msg.content, false)}
                                        </div>
                                    )}

                                    {msg.role === 'assistant' && msg.isOptions && (
                                        <div className="w-full max-w-4xl ml-auto mr-auto mt-4 mb-4">
                                            <div className="flex items-center gap-2 mb-3 px-1">
                                                <span className="text-xs font-bold text-slate-400 uppercase tracking-wider">AI 建议回复</span>
                                                {msg.modelUsed && modelLabel(msg.modelUsed)}
                                            </div>

                                            {/* AI Deep Thought UI - wasDeepThink 时始终显示，thoughtContent 为空时给兼底提示 */}
                                            {msg.wasDeepThink && (
                                                <div className="mb-4 bg-slate-50 border border-slate-200 rounded-xl overflow-hidden hover:border-slate-300 transition-colors">
                                                    <details className="group/details">
                                                        <summary className="flex items-center gap-2 px-4 py-3 cursor-pointer select-none text-slate-500 hover:text-slate-700 bg-white group-open/details:border-b group-open/details:border-slate-100 transition-colors">
                                                            <div className="flex items-center justify-center w-6 h-6 rounded-full bg-slate-100 text-slate-400 group-hover/details:bg-indigo-50 group-hover/details:text-indigo-500 transition-colors">
                                                                <i className="fa-solid fa-brain text-[10px]"></i>
                                                            </div>
                                                            <span className="text-sm font-semibold tracking-wide">AI 思考过程</span>
                                                            {msg.thinkingTime > 0 && (
                                                                <span className="text-[10px] text-slate-400 ml-2">({msg.thinkingTime}秒)</span>
                                                            )}
                                                            <span className="text-[10px] text-slate-400 ml-auto group-open/details:hidden">点击展开</span>
                                                            <i className="fa-solid fa-chevron-down text-xs ml-2 transition-transform group-open/details:rotate-180 text-slate-400"></i>
                                                        </summary>
                                                        <div className="p-4 text-[13px] leading-relaxed text-slate-600 font-sans whitespace-pre-wrap bg-slate-50 msg-anim">
                                                            {msg.thoughtContent?.trim() || '（AI 已完成深度分析，思考过程已内化处理，质量不受影响）'}
                                                        </div>
                                                    </details>
                                                </div>
                                            )}

                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                {msg.options.map((opt, i) => (
                                                    <div
                                                        key={i}
                                                        className={`group bg-white border-2 rounded-xl p-4 transition-all relative flex flex-col h-full ${msg.selectedIdx === i
                                                            ? 'border-[#07c160] shadow-lg shadow-green-100'
                                                            : 'border-slate-200 hover:border-blue-300 hover:shadow-md hover:-translate-y-0.5'
                                                            }`}
                                                    >
                                                        <div className="flex items-center justify-between mb-3">
