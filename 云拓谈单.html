                                                            <span className={`text-xs font-bold px-2 py-1 rounded w-fit ${i === 0 ? 'bg-blue-50 text-blue-600' : 'bg-amber-50 text-amber-600'}`}>
                                                                {i === 0 ? '💬' : '💡'} {opt.type || `方向${i + 1}`}
                                                            </span>
                                                            {msg.selectedIdx === i && (
                                                                <span className="text-[10px] font-bold text-[#07c160] bg-green-50 border border-green-200 px-2 py-0.5 rounded-full flex items-center gap-1">
                                                                    <i className="fa-solid fa-check text-[8px]"></i> 已选用
                                                                </span>
                                                            )}
                                                        </div>
                                                        <div className="space-y-2 flex-1">
                                                            {opt.isAdjusting ? (
                                                                <div className="flex items-center justify-center py-8 text-slate-400">
                                                                    <div className="flex flex-col items-center gap-2">
                                                                        <div className="flex gap-1">
                                                                            <span className="w-2 h-2 bg-blue-400 rounded-full animate-bounce" style={{animationDelay: '0s'}}></span>
                                                                            <span className="w-2 h-2 bg-blue-400 rounded-full animate-bounce" style={{animationDelay: '0.1s'}}></span>
                                                                            <span className="w-2 h-2 bg-blue-400 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></span>
                                                                        </div>
                                                                        <span className="text-xs">正在微调话术...</span>
                                                                    </div>
                                                                </div>
                                                            ) : (
                                                                opt.content.split('|||').map((segment, sIdx) => (
                                                                    <div key={sIdx} className={`relative p-2 pr-9 rounded-lg text-sm text-slate-700 leading-relaxed border transition-colors ${msg.selectedIdx === i
                                                                        ? 'bg-[#f0f9f4] border-[#dcfce7]'
                                                                        : 'bg-slate-50 border-slate-100'
                                                                        }`}>
                                                                        <span className="whitespace-pre-wrap">{segment.trim().replace(/\\n/g, '\n')}</span>
                                                                        <button
                                                                            onClick={(e) => { e.stopPropagation(); copyToClipboard(segment.trim()); }}
                                                                            className="absolute top-1.5 right-1.5 w-6 h-6 flex items-center justify-center rounded text-slate-300 hover:text-[#07c160] hover:bg-white opacity-0 group-hover:opacity-100 transition-all"
                                                                            title="复制这条"
                                                                        >
                                                                            <i className="fa-regular fa-copy text-[10px]"></i>
                                                                        </button>
                                                                    </div>
                                                                ))
                                                            )}
                                                        </div>
                                                        {/* 🌟 新功能：话术微调按钮组 */}
                                                        <div className="mt-3 pt-3 border-t border-slate-100">
                                                            <div className="flex items-center gap-1.5 mb-2 flex-wrap">
                                                                <span className="text-[10px] text-slate-400 font-medium mr-1">快速微调：</span>
                                                                <button
                                                                    onClick={() => handleToneAdjust(idx, i, 'cold')}
                                                                    className="px-2 py-1 text-[10px] rounded-md bg-blue-50 text-blue-600 hover:bg-blue-100 border border-blue-200 transition-colors flex items-center gap-1"
                                                                    title="缩减字数，姿态拉高，不缺单子的态度"
                                                                >
                                                                    🧊 简短高冷
                                                                </button>
                                                                <button
                                                                    onClick={() => handleToneAdjust(idx, i, 'warm')}
                                                                    className="px-2 py-1 text-[10px] rounded-md bg-orange-50 text-orange-600 hover:bg-orange-100 border border-orange-200 transition-colors flex items-center gap-1"
                                                                    title="增加口语化，多套近乎安抚情绪"
                                                                >
                                                                    🔥 温和共情
                                                                </button>
                                                                <button
                                                                    onClick={() => handleToneAdjust(idx, i, 'professional')}
                                                                    className="px-2 py-1 text-[10px] rounded-md bg-purple-50 text-purple-600 hover:bg-purple-100 border border-purple-200 transition-colors flex items-center gap-1"
                                                                    title="加入学术润色术语，体现靠谱实力"
                                                                >
                                                                    🎓 专业硬核
                                                                </button>
                                                                <button
                                                                    onClick={() => handleToneAdjust(idx, i, 'custom')}
                                                                    className="px-2 py-1 text-[10px] rounded-md bg-slate-50 text-slate-600 hover:bg-slate-100 border border-slate-200 transition-colors flex items-center gap-1"
                                                                    title="自定义修改要求"
                                                                >
                                                                    ✏️ 自定义
                                                                </button>
                                                            </div>
                                                        </div>

                                                        <div className="mt-2 flex items-center justify-between">
                                                            {msg.selectedIdx !== i ? (
                                                                <button
                                                                    onClick={() => handleSelectOption(i, idx)}
                                                                    className="text-xs text-blue-500 hover:text-blue-700 font-medium flex items-center gap-1 transition-colors"
                                                                >
                                                                    <i className="fa-solid fa-check-circle text-[10px]"></i> 选用这条
                                                                </button>
                                                            ) : (
                                                                <span className="text-xs text-[#07c160] font-medium">本轮已选用</span>
                                                            )}
                                                            <button
                                                                onClick={(e) => { e.stopPropagation(); copyToClipboard(opt.content.replace(/\|\|\|/g, '\n')); }}
                                                                className="text-xs text-slate-400 hover:text-[#07c160] font-medium flex items-center gap-1 transition-colors"
                                                            >
                                                                <i className="fa-regular fa-copy text-[10px]"></i> 复制全部
                                                            </button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ))}

                            {isLoading && isGeneratingDeep && (
                                <div className="flex justify-start w-full">
                                    <div className="bg-white px-4 py-3 rounded-2xl rounded-tl-none shadow-sm border border-slate-100 flex flex-col gap-2 ml-12 min-w-[200px] max-w-2xl msg-anim">
                                        <div className="flex items-center gap-2">
                                            <span className="typing-indicator"><span></span><span></span><span></span></span>
                                            <span className="text-xs text-slate-500 ml-1 font-medium">
                                                {isGeneratingDeep ? `正深入思考中... 已用时 ${deepThinkSeconds} 秒` : 'AI 分析与生成中...'}
                                            </span>
                                        </div>
                                        {isGeneratingDeep && (
                                            <div className="w-full bg-slate-100 rounded-full h-1 mt-1 overflow-hidden">
                                                <div className="h-full bg-purple-500 transition-all duration-300 rounded-full animate-pulse w-full"></div>
                                            </div>
                                        )}
                                        {/* 实时流式显示的思考过程（有内容才展示）*/}
                                        {currentStreamThought && (
                                            <div className="mt-2 pt-2 border-t border-slate-100/50">
                                                <details className="group/stream" open>
                                                    <summary className="flex items-center justify-between cursor-pointer select-none text-xs text-slate-400 hover:text-slate-600 mb-2">
                                                        <span className="flex items-center gap-1.5"><i className="fa-solid fa-wand-magic-sparkles"></i> 展开/收起 实时思考网络</span>
                                                        <i className="fa-solid fa-chevron-down transition-transform group-open/stream:rotate-180"></i>
                                                    </summary>
                                                    <div className="text-[12px] leading-relaxed text-slate-500 font-sans whitespace-pre-wrap max-h-[250px] overflow-y-auto pr-2 custom-scrollbar bg-slate-50 p-2 rounded-lg border border-slate-100">
                                                        {currentStreamThought}
                                                        <span className="inline-block w-1.5 h-3 ml-1 align-middle bg-slate-400 animate-pulse"></span>
                                                    </div>
                                                </details>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                            <div ref={messagesEndRef} />
                        </div>

                        <div className="bg-[#f5f5f5] px-4 pb-4 pt-2 z-10">
                            <div className="max-w-4xl mx-auto">

                                {/* 我的想法面板（可折叠） */}
                                {showThoughts && (
                                    <div className="mb-2 bg-amber-50 border border-amber-200 rounded-xl p-3 msg-anim">
                                        <div className="flex items-center gap-2 mb-2">
                                            <span className="text-xs font-bold text-amber-700">💡 我的想法 / 策略</span>
                                            <span className="text-[10px] text-amber-500">AI 会优先贴近你的思路来生成回复</span>
                                        </div>
                                        <textarea
                                            value={myThoughts}
                                            onChange={(e) => setMyThoughts(e.target.value)}
                                            placeholder="说说你想怎么应对这个客户... 例如：我想先建立信任，不急着报价 / 我想帮他拟个题目然后顺势成交 / 我感觉他在纠结价格，想用套餐优惠打动他"
                                            className="w-full bg-white border border-amber-200 rounded-lg p-2.5 text-sm text-slate-700 focus:outline-none focus:border-amber-400 resize-none h-20 placeholder:text-amber-300"
                                        />
                                    </div>
                                )}

                                {/* 🌟 功能2：历史记录补录面板 */}
                                {showHistoryImport && (
                                    <div
                                        className="mb-2 bg-green-50 border border-green-200 rounded-xl p-3 msg-anim"
                                        onDragOver={handleHistoryDragOver}
                                        onDrop={handleHistoryDrop}
                                        onPaste={handleHistoryPaste}
                                        tabIndex="0"
                                    >
                                        <div className="flex items-center justify-between mb-2">
                                            <div className="flex items-center gap-2">
                                                <span className="text-xs font-bold text-green-700">🔗 补录历史沟通记录</span>
                                                <span className="text-[10px] text-green-500">让AI了解前情提要，无缝接手对话</span>
                                            </div>
                                            <button
                                                onClick={() => setShowHistoryImport(false)}
                                                className="text-green-400 hover:text-green-600 transition-colors"
                                            >
                                                <i className="fa-solid fa-xmark text-sm"></i>
                                            </button>
                                        </div>

                                        <div className="bg-white border-2 border-dashed border-green-300 rounded-lg p-4 mb-2 hover:border-green-400 hover:bg-green-50/30 transition-all">
                                            <div className="text-center">
                                                <i className="fa-solid fa-cloud-arrow-up text-3xl text-green-400 mb-2"></i>
                                                <p className="text-xs text-slate-600 mb-1 font-medium">拖拽图片到此处 或 Ctrl+V 粘贴</p>
                                                <p className="text-[10px] text-slate-400 mb-3">支持微信/淘宝聊天截图、文本文件</p>
                                                <input
                                                    type="file"
                                                    multiple
                                                    accept="image/*,.txt"
                                                    onChange={handleHistoryFileUpload}
                                                    className="hidden"
                                                    id="historyFileInput"
                                                />
                                                <label
                                                    htmlFor="historyFileInput"
                                                    className="inline-block py-2 px-4 bg-green-500 hover:bg-green-600 text-white rounded-lg text-xs font-medium cursor-pointer transition-colors"
                                                >
                                                    <i className="fa-solid fa-folder-open mr-1"></i> 或点击选择文件
                                                </label>
                                            </div>
                                        </div>

                                        {historyImportFiles.length > 0 && (
                                            <div className="space-y-2 mb-2">
                                                {historyImportFiles.map((f, i) => (
                                                    <div key={i} className="flex items-center gap-2 bg-white border border-green-200 rounded-lg p-2">
                                                        {f.type === 'image' ? (
                                                            <img src={f.dataUrl} className="w-10 h-10 object-cover rounded" alt="预览" />
                                                        ) : (
                                                            <div className="w-10 h-10 bg-blue-100 rounded flex items-center justify-center">
                                                                <i className="fa-solid fa-file-lines text-blue-500"></i>
                                                            </div>
                                                        )}
                                                        <span className="flex-1 text-xs text-slate-700 truncate">{f.name}</span>
                                                        <button
                                                            onClick={() => setHistoryImportFiles(prev => prev.filter((_, idx) => idx !== i))}
                                                            className="text-red-400 hover:text-red-600 transition-colors"
                                                        >
                                                            <i className="fa-solid fa-trash-can text-xs"></i>
                                                        </button>
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                        <button
                                            onClick={handleHistoryImport}
                                            disabled={historyImportFiles.length === 0 || isImportingHistory}
                                            className="w-full py-2 bg-green-600 hover:bg-green-700 disabled:bg-slate-300 text-white rounded-lg text-xs font-bold transition-colors"
                                        >
                                            {isImportingHistory ? (
                                                <><i className="fa-solid fa-spinner fa-spin mr-1"></i> 正在导入...</>
                                            ) : (
                                                <><i className="fa-solid fa-check mr-1"></i> 确认导入历史记录</>
                                            )}
                                        </button>
                                    </div>
                                )}

                                {/* 已上传文件 chips（支持缩略图） */}
                                {uploadedFiles.length > 0 && (
                                    <div className="flex flex-wrap gap-2 mb-2 p-1">
                                        {uploadedFiles.map((f, i) => (
                                            <div
                                                key={i}
                                                onClick={() => {
                                                    if (f.type === 'image') {
                                                        setPreviewFile(f);
                                                    } else if (f.rawFile) {
                                                        // 纯文本可以直接预览
                                                        if (f.name?.match(/\.(txt|md|csv)$/i)) {
                                                            setPreviewFile(f);
                                                            return;
                                                        }
                                                        // PDF 可以直接用浏览器原生阅读器全屏打开
                                                        if (f.name?.match(/\.pdf$/i) || f.type?.includes('pdf')) {
                                                            window.open(URL.createObjectURL(f.rawFile));
                                                            return;
                                                        }

                                                        // Word/Excel等文档浏览器无法直接预览?
                                                        // 此前?Blob 下载?file:// 协议下会导致失去后缀名变?UUID 乱码文件?
                                                        // 改用 DataURL 下载以强制让浏览器带上真实文件名和扩展名，使 Windows 可以使用正确的软件打开它?
                                                        const reader = new FileReader();
                                                        reader.onload = (evt) => {
                                                            const a = document.createElement('a');
                                                            a.href = evt.target.result;
                                                            a.download = f.name; // 确保带有原始后缀?(例如 .docx)
                                                            a.style.display = 'none';
                                                            document.body.appendChild(a);
                                                            a.click();
                                                            document.body.removeChild(a);
                                                        };
                                                        reader.readAsDataURL(f.rawFile);
                                                    }
                                                }}
                                                className="flex items-center gap-2 bg-white border border-slate-200 shadow-sm rounded-lg pr-2 pl-1.5 py-1.5 text-xs text-slate-700 cursor-pointer hover:border-[#07c160] transition-colors group msg-anim"
                                                title={f.type === 'image' ? "点击看大图" : "调用系统默认程序打开"}
                                            >
                                                {f.type === 'image' ? (
                                                    <div className="w-8 h-8 rounded overflow-hidden shadow-sm shrink-0 border border-slate-100 bg-slate-50">
                                                        <img src={f.dataUrl} className="w-full h-full object-cover" alt="缩略图" />
                                                    </div>
                                                ) : (
                                                    <div className="w-8 h-8 rounded shrink-0 bg-blue-50 text-blue-500 flex items-center justify-center">
                                                        <i className="fa-solid fa-file-lines text-sm gap-1"></i>
                                                    </div>
                                                )}
                                                <div className="flex flex-col flex-1 min-w-[60px] max-w-[120px]">
                                                    <span className="truncate font-medium">{f.name}</span>
                                                    <span className="text-[10px] text-slate-400 group-hover:text-[#07c160] transition-colors">{f.type === 'image' ? '点击看大图' : '点击直接打开'}</span>
                                                </div>
                                                <button onClick={(e) => { e.stopPropagation(); removeFile(i); }} className="w-6 h-6 ml-1 flex items-center justify-center rounded-full text-slate-300 hover:text-red-500 hover:bg-slate-100 transition-colors shrink-0">
                                                    <i className="fa-solid fa-xmark"></i>
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {/* 🌟 功能4：AI想法预判推演 */}
                                {aiSuggestions.length > 0 && (
                                    <div className="mb-3 bg-gradient-to-r from-purple-50 to-blue-50 rounded-xl border border-purple-200 overflow-hidden">
                                        <div
                                            className="flex items-center justify-between px-4 py-2 cursor-pointer hover:bg-purple-100/50 transition-colors"
                                            onClick={() => setShowAiSuggestions(!showAiSuggestions)}
                                        >
                                            <div className="flex items-center gap-2">
                                                <i className="fa-solid fa-brain text-purple-600"></i>
                                                <span className="text-sm font-bold text-purple-700">AI战术建议</span>
                                                <span className="text-xs text-purple-500">（点击使用，右侧可编辑）</span>
                                            </div>
                                            <i className={`fa-solid fa-chevron-${showAiSuggestions ? 'up' : 'down'} text-purple-400 text-xs`}></i>
                                        </div>
                                        {showAiSuggestions && (
                                            <div className="px-4 pb-3 space-y-2">
                                                {aiSuggestions.map((suggestion, idx) => (
                                                    <div key={idx} className="flex items-center gap-2">
                                                        {editingSuggestionIndex === idx ? (
                                                            <>
                                                                <input
                                                                    type="text"
                                                                    value={editingSuggestionText}
                                                                    onChange={(e) => setEditingSuggestionText(e.target.value)}
                                                                    className="flex-1 px-3 py-2 text-sm border border-purple-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
                                                                    autoFocus
                                                                />
                                                                <button
                                                                    onClick={() => {
                                                                        const newSuggestions = [...aiSuggestions];
                                                                        newSuggestions[idx] = editingSuggestionText;
                                                                        setAiSuggestions(newSuggestions);
                                                                        setEditingSuggestionIndex(null);
                                                                        setEditingSuggestionText('');
                                                                    }}
                                                                    className="px-3 py-2 bg-purple-600 text-white text-xs rounded-lg hover:bg-purple-700 transition-colors"
                                                                >
                                                                    <i className="fa-solid fa-check"></i>
                                                                </button>
                                                                <button
                                                                    onClick={() => {
                                                                        setEditingSuggestionIndex(null);
                                                                        setEditingSuggestionText('');
                                                                    }}
                                                                    className="px-3 py-2 bg-slate-300 text-slate-700 text-xs rounded-lg hover:bg-slate-400 transition-colors"
                                                                >
                                                                    <i className="fa-solid fa-times"></i>
                                                                </button>
                                                            </>
                                                        ) : (
                                                            <>
                                                                <button
                                                                    onClick={(e) => {
                                                                        e.stopPropagation();  // 🔥 阻止事件冒泡，防止触发折叠
                                                                        setMyThoughts(suggestion);
                                                                        setShowThoughts(true);
                                                                        showToast('已填入"我的想法"');
                                                                        // 🔥 不折叠面板，保持展开状态
                                                                    }}
                                                                    className="flex-1 text-left px-3 py-2 bg-white border border-purple-200 rounded-lg hover:border-purple-400 hover:shadow-md transition-all text-sm text-slate-700"
                                                                >
                                                                    <span className="font-bold text-purple-600 mr-2">方向{idx + 1}:</span>
                                                                    {suggestion}
                                                                </button>
                                                                <button
                                                                    onClick={(e) => {
                                                                        e.stopPropagation();  // 🔥 阻止事件冒泡
                                                                        setEditingSuggestionIndex(idx);
                                                                        setEditingSuggestionText(suggestion);
                                                                    }}
                                                                    className="px-2 py-2 text-purple-400 hover:text-purple-600 hover:bg-purple-100 rounded-lg transition-colors"
                                                                    title="编辑"
                                                                >
                                                                    <i className="fa-solid fa-pen text-xs"></i>
                                                                </button>
                                                            </>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )}

                                {/* 主输入区 - 支持拖拽 */}
                                <div
                                    className={`bg-white rounded-xl shadow-sm border-2 p-2 transition-all relative ${isDragging
                                        ? 'border-[#07c160] border-dashed shadow-md'
                                        : 'border-slate-200'
                                        }`}
                                    onDragOver={handleDragOver}
                                    onDragLeave={handleDragLeave}
                                    onDrop={handleDrop}
                                >
                                    {/* 拖拽遮罩提示 */}
                                    {isDragging && (
                                        <div className="absolute inset-0 bg-[#07c160]/10 rounded-xl flex items-center justify-center z-10 pointer-events-none">
                                            <div className="flex flex-col items-center gap-2 text-[#07c160]">
                                                <i className="fa-solid fa-cloud-arrow-up text-3xl"></i>
                                                <span className="text-sm font-bold">释放鼠标上传文件</span>
                                            </div>
                                        </div>
                                    )}
                                    <textarea
                                        value={inputMsg}
                                        onChange={(e) => setInputMsg(e.target.value)}
                                        onKeyDown={(e) => {
                                            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleGenerate(); }
                                        }}
                                        onPaste={handlePaste}
                                        placeholder="粘贴客户消息... (Ctrl+V 可直接粘贴截图)"
                                        className="w-full p-3 bg-transparent focus:outline-none resize-none h-14 text-slate-800 placeholder:text-slate-400 text-sm"
                                    ></textarea>
                                    <div className="flex items-center justify-between px-1 pb-1">
                                        <div className="flex items-center gap-2">
                                            {/* 我的想法按钮 */}
                                            <button
                                                onClick={() => setShowThoughts(!showThoughts)}
                                                className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium transition-all ${showThoughts || myThoughts.trim()
                                                    ? 'bg-amber-100 text-amber-700 border border-amber-300'
                                                    : 'bg-slate-100 text-slate-500 hover:bg-amber-50 hover:text-amber-600'
                                                    }`}
                                                title="输入你的谈单想法，AI 会优先贴近你的思路"
                                            >
                                                <i className="fa-solid fa-lightbulb text-[11px]"></i>
                                                我的想法
                                                {myThoughts.trim() && <span className="w-1.5 h-1.5 rounded-full bg-amber-500"></span>}
                                            </button>

                                            {/* 文件上传按钮 */}
                                            <button
                                                onClick={() => fileInputRef.current?.click()}
                                                className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium transition-all ${uploadedFiles.length > 0
                                                    ? 'bg-blue-100 text-blue-700 border border-blue-300'
                                                    : 'bg-slate-100 text-slate-500 hover:bg-blue-50 hover:text-blue-600'
                                                    }`}
                                                title="上传客户截图、学校要求文档等（截图可直接Ctrl+V粘贴）">
                                                <i className="fa-solid fa-paperclip text-[11px]"></i>
                                                上传文件
                                                {uploadedFiles.length > 0 && <span className="bg-blue-500 text-white text-[10px] rounded-full px-1.5">{uploadedFiles.length}</span>}
                                            </button>
                                            <input
                                                ref={fileInputRef}
                                                type="file"
                                                multiple
                                                accept="image/*,.txt,.doc,.docx,.pdf"
                                                style={{ display: 'none' }}
                                                onChange={handleFileUpload}
                                            />

                                            {/* 深度思考按钮 */}
                                            <button
                                                onClick={() => setIsDeepThink(!isDeepThink)}
                                                className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium transition-all ${isDeepThink
                                                    ? 'bg-purple-100 text-purple-700 border border-purple-400'
                                                    : 'bg-slate-100 text-slate-500 hover:bg-purple-50 hover:text-purple-600'
                                                    }`}
                                                title={isDeepThink ? '已开启深度思考（deepseek-reasoner），点击关闭' : '开启深度思考：用于异议处理/价格谈判等复杂场景，速度较慢'}
                                            >
                                                <i className="fa-solid fa-brain text-[11px]"></i>
                                                深度思考
                                                {isDeepThink && <span className="w-1.5 h-1.5 rounded-full bg-purple-500 animate-pulse"></span>}
                                            </button>

                                            {/* 🌟 功能2：历史记录补录按钮 */}
                                            <button
                                                onClick={() => setShowHistoryImport(!showHistoryImport)}
                                                className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium transition-all ${showHistoryImport || historyImportFiles.length > 0
                                                    ? 'bg-green-100 text-green-700 border border-green-300'
                                                    : 'bg-slate-100 text-slate-500 hover:bg-green-50 hover:text-green-600'
                                                    }`}
                                                title="补录微信/淘宝等平台的历史聊天记录，让AI了解前情提要"
                                            >
                                                <i className="fa-solid fa-clock-rotate-left text-[11px]"></i>
                                                补录历史
                                                {historyImportFiles.length > 0 && <span className="bg-green-500 text-white text-[10px] rounded-full px-1.5">{historyImportFiles.length}</span>}
                                            </button>

                                            {/* 🌟 功能3：提取客户信息按钮 */}
                                            <button
                                                onClick={handleExtractCustomerInfo}
                                                disabled={isExtractingInfo || chatHistory.length === 0}
                                                className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium transition-all ${showCustomerInfo
                                                    ? 'bg-blue-100 text-blue-700 border border-blue-300'
                                                    : 'bg-slate-100 text-slate-500 hover:bg-blue-50 hover:text-blue-600 disabled:opacity-50 disabled:cursor-not-allowed'
                                                    }`}
                                                title="从对话中提取客户基本信息"
                                            >
                                                <i className={`fa-solid ${isExtractingInfo ? 'fa-spinner fa-spin' : 'fa-address-card'} text-[11px]`}></i>
                                                {isExtractingInfo ? '提取中...' : '提取信息'}
                                            </button>
                                        </div>

                                        {isLoading ? (
                                            <button
                                                onClick={handleStopGenerate}
                                                className="px-5 py-1.5 rounded-lg font-bold text-white text-sm transition-all flex items-center gap-1.5 bg-red-500 hover:bg-red-600 shadow-sm active:scale-95"
                                            >
                                                <i className="fa-solid fa-stop"></i> 停止生成
                                            </button>
                                        ) : (
                                            <button
                                                onClick={handleGenerate}
                                                disabled={!inputMsg.trim() || ocrStatus === 'running'}
                                                className={`px-5 py-1.5 rounded-lg font-bold text-white text-sm transition-all flex items-center gap-1.5 ${!inputMsg.trim() || ocrStatus === 'running'
                                                    ? 'bg-slate-300 cursor-not-allowed'
                                                    : isDeepThink
                                                        ? 'bg-purple-600 hover:bg-purple-700 active:scale-95'
                                                        : 'bg-[#07c160] hover:bg-[#06ad56] active:scale-95'
                                                    }`}
                                            >
                                                {isDeepThink
                                                    ? <><i className="fa-solid fa-brain"></i> 深度生成</>
                                                    : <><i className="fa-solid fa-paper-plane"></i> 生成</>
                                                }
                                            </button>
                                        )}
                                    </div>
                                </div>

                                {/* OCR 进度?*/}
                                {ocrStatus !== 'idle' && (
                                    <div className="mt-2 rounded-xl overflow-hidden border border-slate-200 bg-white shadow-sm msg-anim">
                                        <div className="flex items-center gap-3 px-4 py-2.5">
                                            {ocrStatus === 'running' && (
                                                <>
                                                    <i className="fa-solid fa-spinner fa-spin text-blue-500 text-sm"></i>
                                                    <div className="flex-1">
                                                        <div className="flex justify-between items-center mb-1">
                                                            <span className="text-xs font-medium text-slate-600">🔍 正在识别图片文字...</span>
                                                            <span className="text-xs font-bold text-blue-600">{ocrProgress}%</span>
                                                        </div>
                                                        <div className="w-full bg-slate-100 rounded-full h-2 overflow-hidden">
                                                            <div
                                                                className="h-2 rounded-full bg-gradient-to-r from-blue-400 to-blue-600 transition-all duration-300"
                                                                style={{ width: `${ocrProgress}%` }}
                                                            ></div>
                                                        </div>
                                                        <p className="text-[10px] text-slate-400 mt-1">识别完成后再点「生成」，确保AI看到真实内容</p>
                                                    </div>
                                                </>
                                            )}
                                            {ocrStatus === 'done' && (
                                                <>
                                                    <i className="fa-solid fa-circle-check text-emerald-500 text-sm"></i>
                                                    <span className="text-xs font-medium text-emerald-600">✅ 图片文字识别完成！AI 将读取真实内容</span>
                                                </>
                                            )}
                                            {ocrStatus === 'error' && (
                                                <>
                                                    <i className="fa-solid fa-triangle-exclamation text-red-500 text-sm"></i>
                                                    <span className="text-xs font-medium text-red-600">⚠️ 识别失败，请手动将图片内容复制粘贴进输入框</span>
                                                </>
                                            )}
                                        </div>
                                    </div>
                                )}

                                <div className="text-center mt-1.5 flex flex-col items-center gap-1.5 text-[11px] text-slate-400">
                                    <div className="flex items-center gap-2">
                                        <span className="font-semibold text-slate-500">切换大模型引擎：</span>
                                        <select
                                            value={appConfig.provider}
                                            onChange={(e) => updateConfig(p => ({ ...p, provider: e.target.value }))}
                                            className="bg-transparent text-xs text-blue-500 font-bold border-none outline-none cursor-pointer hover:bg-slate-100 rounded px-1 py-0.5"
                                        >
                                            {AI_PROVIDERS.map(p => <option key={p.id} value={p.id}>{p.name}{appConfig.keys[p.id] ? ' ✓' : ''}</option>)}
                                        </select>
                                    </div>
                                    <p>识别完成再点生成 | Enter 发送 | Ctrl+V 粘贴截图 · 拖拽上传文件</p>
                                </div>
                            </div>
                        </div>

                        {toast && (
                            <div className={`fixed top-6 left-1/2 transform -translate-x-1/2 px-4 py-3 rounded-xl shadow-2xl text-white text-sm flex items-start gap-2 z-[9999] whitespace-pre-wrap max-w-md w-full border border-white/10 ${toast.type === 'error' ? 'bg-red-600' : 'bg-slate-800'
                                }`}>{toast.msg}</div>
                        )}

                        {/* 🌟 自定义话术微调弹窗 */}
                        {showCustomAdjustModal && (
                            <div 
                                className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[10000] p-4"
                                onClick={() => {
                                    setShowCustomAdjustModal(false);
                                    setCustomAdjustData(null);
                                }}
                            >
                                <div 
                                    className="bg-white rounded-2xl shadow-2xl max-w-lg w-full p-6"
                                    onClick={(e) => e.stopPropagation()}
                                >
                                    <div className="flex items-center gap-3 mb-4">
                                        <div className="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center">
                                            <i className="fa-solid fa-wand-magic-sparkles text-blue-600"></i>
                                        </div>
                                        <h3 className="text-lg font-bold text-slate-800">自定义话术微调</h3>
                                    </div>
                                    
                                    <div className="mb-6">
                                        <label className="block text-sm font-medium text-slate-700 mb-2">
                                            请输入你的修改要求
                                        </label>
                                        <textarea
                                            id="customAdjustInput"
                                            className="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none text-sm"
                                            rows="4"
                                            placeholder="例如：加上价格优惠信息 / 删掉最后一句 / 改得更简洁"
                                            autoFocus
                                        ></textarea>
                                    </div>
                                    
                                    <div className="mb-4">
                                        <p className="text-sm text-slate-600 mb-3">请选择微调模式：</p>
                                        <div className="grid grid-cols-2 gap-3">
                                            <button
                                                onClick={() => {
                                                    const input = document.getElementById('customAdjustInput');
                                                    const instruction = input?.value?.trim();
                                                    if (!instruction) {
                                                        showToast('请输入修改要求', 'error');
                                                        return;
                                                    }
                                                    handleCustomAdjustSubmit(instruction, 'polish');
                                                }}
                                                className="flex flex-col items-center gap-2 p-4 border-2 border-blue-500 bg-blue-50 rounded-xl hover:bg-blue-100 transition-colors"
                                            >
                                                <i className="fa-solid fa-pen-fancy text-blue-600 text-xl"></i>
                                                <div className="text-center">
                                                    <div className="font-bold text-slate-800 text-sm">保留原意润色</div>
                                                    <div className="text-xs text-slate-600 mt-1">根据要求优化表达</div>
                                                </div>
                                            </button>
                                            
                                            <button
                                                onClick={() => {
                                                    const input = document.getElementById('customAdjustInput');
                                                    const instruction = input?.value?.trim();
                                                    if (!instruction) {
                                                        showToast('请输入修改要求', 'error');
                                                        return;
                                                    }
                                                    handleCustomAdjustSubmit(instruction, 'regenerate');
                                                }}
                                                className="flex flex-col items-center gap-2 p-4 border-2 border-purple-500 bg-purple-50 rounded-xl hover:bg-purple-100 transition-colors"
                                            >
                                                <i className="fa-solid fa-rotate text-purple-600 text-xl"></i>
                                                <div className="text-center">
                                                    <div className="font-bold text-slate-800 text-sm">重新生成</div>
                                                    <div className="text-xs text-slate-600 mt-1">根据上下文重写</div>
                                                </div>
                                            </button>
                                        </div>
                                    </div>
                                    
                                    <button
                                        onClick={() => {
                                            setShowCustomAdjustModal(false);
                                            setCustomAdjustData(null);
                                        }}
                                        className="w-full py-2.5 text-slate-600 hover:bg-slate-100 rounded-xl transition-colors text-sm font-medium"
                                    >
                                        取消
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div >
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // 🔥 临时修复：隐藏可能意外显示的单独数字0
        setTimeout(() => {
            const textNodes = document.createTreeWalker(
                document.body,
                NodeFilter.SHOW_TEXT,
                null,
                false
            );
            let node;
            while (node = textNodes.nextNode()) {
                if (node.textContent.trim() === '0' && node.parentElement) {
                    const parent = node.parentElement;
                    // 只隐藏那些只包含单独0的元素
                    if (parent.textContent.trim() === '0' && parent.children.length === 0) {
                        parent.style.display = 'none';
                    }
                }
            }
        }, 100);
    </script>
</body>
